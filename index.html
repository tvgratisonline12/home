<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Grátis | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #8a2be2; --green: #00ff88; }
        
        body { 
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 70%); 
            color: #fff; font-family: 'Montserrat', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
        }

        .header { text-align: center; }
        .welcome-text { font-size: 1.2rem; font-weight: 400; letter-spacing: 0.2rem; text-transform: uppercase; color: var(--accent); }
        .site-name-main { font-size: 2.5rem; font-weight: 900; color: #fff; }
        .site-name-ext { font-size: 2.5rem; font-weight: 900; color: var(--green); }

        .content-center { height: 220px; display: flex; align-items: center; justify-content: center; position: relative; }
        .spin-container { position: absolute; }
        
        /* Imagem proporcional */
        .logo { width: 180px; animation: entrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .promo-container { position: absolute; text-align: center; opacity: 0; transition: opacity 0.6s ease; }
        .promo-text { font-size: 3.5rem; font-weight: 900; line-height: 0.85; text-transform: uppercase; }

        /* Grid de botões 2x2 */
        .actions { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            width: 90%; max-width: 400px; justify-items: center;
        }
        .action-group { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; }
        .action-label { color: #fff; font-size: 0.6rem; letter-spacing: 0.1rem; opacity: 0.7; text-transform: uppercase; }

        .btn { 
            padding: 10px 10px; border: 2px solid; border-radius: 10px;
            background: transparent; font-weight: 700; cursor: pointer;
            transition: all 0.3s; font-size: 0.8rem; width: 100%;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
        }
        .btn-green { border-color: var(--green); color: var(--green); }
        .btn-purple { border-color: var(--accent); color: var(--accent); }

        @keyframes entrance {
            0% { transform: scale(0.5); filter: blur(10px); opacity: 0; }
            100% { transform: scale(1); filter: blur(0px); opacity: 1; }
        }

        /* Ajustes específicos para telas muito pequenas */
        @media (max-height: 600px) {
            .site-name-main, .site-name-ext { font-size: 2rem; }
            .promo-text { font-size: 2.5rem; }
            .content-center { height: 150px; }
            .logo { width: 120px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="welcome-text">Bem-vindos ao</div>
        <div>
            <span class="site-name-main">TVGRÁTIS</span><span class="site-name-ext">.ONLINE</span>
        </div>
    </div>

    <div class="content-center">
        <div class="spin-container" id="logo-box">
            <img src="imagem256.png" class="logo" alt="Logo">
        </div>
        <div class="promo-container" id="promo-box">
            <div class="promo-text">
                <span id="top" style="color:var(--green)">100%</span><br>
                <span id="bottom" style="color:var(--green)">GRÁTIS</span>
            </div>
        </div>
    </div>

    <div class="actions">
        <div class="action-group"><span class="action-label">Baixar</span><a href="/download/android" class="btn btn-green">Android</a></div>
        <div class="action-group"><span class="action-label">Baixar</span><a href="/download/androidtv" class="btn btn-green">Android TV</a></div>
        <div class="action-group"><span class="action-label">Baixar</span><a href="/download/windows" class="btn btn-purple">Windows</a></div>
        <div class="action-group"><span class="action-label">Assistir</span><a href="/player" class="btn btn-purple">Web Player</a></div>
    </div>

    <script>
        const logoBox = document.getElementById('logo-box');
        const promoBox = document.getElementById('promo-box');
        const topEl = document.getElementById('top');
        const bottomEl = document.getElementById('bottom');
        
        function runCycle() {
            logoBox.style.display = "block";
            promoBox.style.opacity = 0;
            setTimeout(() => {
                logoBox.style.display = "none";
                promoBox.style.opacity = 1;
                topEl.innerText = "100%"; bottomEl.innerText = "GRÁTIS";
                topEl.style.color = "var(--green)"; bottomEl.style.color = "var(--green)";
                setTimeout(() => {
                    topEl.innerText = "SEM"; bottomEl.innerText = "ANÚNCIOS";
                    topEl.style.color = "var(--accent)"; bottomEl.style.color = "var(--accent)";
                    setTimeout(runCycle, 3000);
                }, 3000);
            }, 2500);
        }
        runCycle();
    </script>
</body>
</html>
