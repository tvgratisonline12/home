<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>TV Grátis - Assista Canais de TV Online Grátis e Ao Vivo</title>
    <meta name="description" content="Assista canais de TV online grátis e ao vivo.">
    <link rel="canonical" href="https://tvgratis.online/">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#111111">
    <link rel="icon" href="/imagens/favicon.ico">
    <style>
        :root { --bg: #000; --accent: #8a2be2; --green: #00ff88; }
        
        body { 
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 70%); 
            color: #fff; font-family: 'Montserrat', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
        }

        .header { text-align: center; }
        
        /* Cores solicitadas no título */
        .welcome-text { font-size: 1.2rem; font-weight: 400; letter-spacing: 0.3rem; text-transform: uppercase; color: var(--accent); }
        .site-name-main { font-size: 3rem; font-weight: 900; letter-spacing: 0.1rem; color: #fff; }
        .site-name-ext { font-size: 3rem; font-weight: 900; letter-spacing: 0.1rem; color: var(--green); }

        .content-center { height: 280px; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .spin-container { position: absolute; }
        .logo { width: 220px; animation: entrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .promo-container { position: absolute; text-align: center; opacity: 0; transition: opacity 0.6s ease; }
        .promo-text { font-size: 5rem; font-weight: 900; line-height: 0.85; text-transform: uppercase; }

        .actions { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 95%; }
        .action-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .action-label { color: #fff; font-size: 0.7rem; letter-spacing: 0.2rem; opacity: 0.7; }

        .btn { 
            padding: 14px 30px; border: 2px solid; border-radius: 12px;
            background: transparent; font-weight: 700; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 0.9rem; width: 160px;
            white-space: nowrap; text-transform: uppercase; letter-spacing: 0.1rem;
        }
        .btn-green { border-color: var(--green); color: var(--green); }
        .btn-green:hover { background: var(--green); color: #000; box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
        .btn-purple { border-color: var(--accent); color: var(--accent); }
        .btn-purple:hover { background: var(--accent); color: #fff; box-shadow: 0 0 20px rgba(138, 43, 226, 0.4); }

        @keyframes entrance {
            0% { transform: scale(0.5) rotate(0deg); filter: blur(10px); opacity: 0; }
            100% { transform: scale(1) rotate(360deg); filter: blur(0px); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="welcome-text">Bem-vindos ao</div>
        <div>
            <span class="site-name-main">TVGRÁTIS</span><span class="site-name-ext">.ONLINE</span>
        </div>
    </div>

    <div class="content-center">
        <div class="spin-container" id="logo-box">
            <img src="imagem256.png" class="logo" alt="Logo">
        </div>
        <div class="promo-container" id="promo-box">
            <div class="promo-text">
                <span id="top" style="color:var(--green)">100%</span><br>
                <span id="bottom" style="color:var(--green)">GRÁTIS</span>
            </div>
        </div>
    </div>

    <div class="actions">
        <div class="action-group"><span class="action-label">Baixar</span><button class="btn btn-green">Android TV</button></div>
        <div class="action-group"><span class="action-label">Baixar</span><button class="btn btn-green">Mobile</button></div>
        <div class="action-group"><span class="action-label">Baixar</span><button class="btn btn-purple">Windows</button></div>
        <div class="action-group"><span class="action-label">Assistir</span><button class="btn btn-purple">Web Player</button></div>
    </div>

    <script>
        const logoBox = document.getElementById('logo-box');
        const promoBox = document.getElementById('promo-box');
        const topEl = document.getElementById('top');
        const bottomEl = document.getElementById('bottom');
        
        function runCycle() {
            logoBox.style.display = "block";
            promoBox.style.opacity = 0;
            
            setTimeout(() => {
                logoBox.style.display = "none";
                promoBox.style.opacity = 1;
                
                topEl.innerText = "100%"; bottomEl.innerText = "GRÁTIS";
                topEl.style.color = "var(--green)"; bottomEl.style.color = "var(--green)";
                
                setTimeout(() => {
                    topEl.innerText = "SEM"; bottomEl.innerText = "ANÚNCIOS";
                    topEl.style.color = "var(--accent)"; bottomEl.style.color = "var(--accent)";
                    
                    setTimeout(runCycle, 3000);
                }, 3000);
            }, 2500);
        }
        runCycle();
    </script>
</body>
</html>
