<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>TV Grátis - Assista Canais de TV Online Grátis e Ao Vivo</title>
    <meta name="description" content="Assista canais de TV online grátis e ao vivo.">
    <link rel="canonical" href="https://tvgratis.online/">
    <script src="player.js"></script>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#111111">
    <link rel="icon" href="favicon.ico">
</head>
<body>

    <aside>
        <div class="brand-container">
            <div class="categoria-header">
                <button class="cat-btn" onclick="categoriaAnterior()">❮</button>
                <div class="tituloCategoria"><span id="categoriaAtual">Todos</span></div>
                <button class="cat-btn" onclick="proximaCategoria()">❯</button>
            </div>
        </div>
        <div class="search-box">
            <input type="text" id="filter" placeholder="🔍 Buscar canal..." onkeyup="renderList()" readonly onfocus="this.removeAttribute('readonly');" onblur="this.setAttribute('readonly', 'readonly');">
        </div>
        <div class="channel-list" id="contentList"></div>
    </aside>
    
    <main>
        <div id="player-container" ondblclick="toggleFullScreen()">
            <div id="player"></div>
            <div id="iframe-overlay"></div>
        </div>
    </main>

    <script src="layout2.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest/disable-devtool.min.js"></script>
    
    <script>
        DisableDevtool({
            md5: '8865f3a072045558837311100572d427',
            url: 'bloqueado.html',
            disableMenu: true,
            disableSelect: true,
            disableCopy: true
        });

        // Função para FullScreen do container
        function toggleFullScreen() {
            const elem = document.getElementById("player-container");
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => alert(`Erro ao entrar em tela cheia: ${err.message}`));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
