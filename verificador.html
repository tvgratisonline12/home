<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria de Canais Pro</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --primary: #3b82f6;
            --success: #22c55e;
            --error: #ef4444;
            --text: #1e293b;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .resumo { background: #eff6ff; padding: 20px; border-radius: 12px; border-left: 5px solid var(--primary); margin-bottom: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .item { background: white; padding: 12px 16px; margin: 8px 0; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; align-items: center; }
        .ok { border-left: 4px solid var(--success); }
        .erro { border-left: 4px solid var(--error); }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-right: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>🔍 Auditoria de Canais</h1></div>
    <div id="resumo" class="resumo">Aguardando dados...</div>
    <h2>✅ Canais Ativos</h2>
    <div id="listaOk"></div>
    <h2>❌ Canais com Problemas</h2>
    <div id="listaErros"></div>
</div>

<script>
async function rodarAuditoria() {
    const listaOk = document.getElementById('listaOk');
    const listaErros = document.getElementById('listaErros');
    const resumoDiv = document.getElementById('resumo');
    let contagem = { ok: 0, erro: 0 };

    try {
        const resposta = await fetch('imagens.json');
        const canais = await resposta.json();

        for (const item of canais) {
            // Lógica de montagem da URL baseada na qualidade
            let urlFinal;
            if (item.qualidade === 'sd') {
                urlFinal = item.logo + '.m3u8';
            } else if (item.qualidade === 'hd') {
                urlFinal = 'https://ww4.embedtv.lat/' + item.logo;
            } else {
                urlFinal = item.logo; // Caso não tenha qualidade definida
            }

            try {
                // Testa a URL
                const res = await fetch(urlFinal, { method: 'HEAD', mode: 'cors' });

                if (res.ok) {
                    contagem.ok++;
                    listaOk.innerHTML += `<div class="item ok"><span class="badge" style="background:#dcfce7;color:#166534">OK</span> ${item.canal}</div>`;
                } else {
                    registrarErro(item, `Status ${res.status}`);
                }
            } catch (err) {
                registrarErro(item, "Erro Conexão");
            }
        }
        resumoDiv.innerHTML = `<strong>Total OK: ${contagem.ok}</strong> | <strong style="color:var(--error)">Total Erro: ${contagem.erro}</strong>`;
    } catch (e) {
        resumoDiv.innerHTML = `<span style="color:var(--error)">Erro ao carregar JSON: ${e.message}</span>`;
    }

    function registrarErro(item, msg) {
        contagem.erro++;
        listaErros.innerHTML += `<div class="item erro"><span class="badge" style="background:#fee2e2;color:#991b1b">${msg}</span> ${item.canal}</div>`;
    }
}

rodarAuditoria();
</script>
</body>
</html>
