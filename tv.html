<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Grátis - Canais Online</title>
    <style>
        /* CSS Integrado */
        body { margin: 0; background: #111; color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; display: flex; }
        aside { width: 300px; background: #1a1a1a; display: flex; flex-direction: column; }
        main { flex: 1; position: relative; }
        
        .item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; display: flex; align-items: center; }
        .item:hover { background: #222; }
        .item.active { background: #444; }
        .canal-fhd { border-left: 4px solid red !important; color: #ff4d4d !important; }
        
        #player-container { width: 100%; height: 100%; position: relative; background: #000; }
        #player { width: 100%; height: 100%; }
        
        #iframe-overlay-aviso {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; color: white; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
    </style>
</head>
<body>

    <aside>
        <div class="search-box"><input type="text" id="filter" placeholder="🔍 Buscar canal..." onkeyup="filterList()"></div>
        <div class="channel-list" id="contentList"></div>
    </aside>
    
    <main>
        <div id="player-container">
            <div id="iframe-overlay-aviso">
                <h2 style="color:red">AVISO IMPORTANTE</h2>
                <p>Este canal contém anúncios de terceiros que não controlamos.</p>
                <p>O player será liberado em <span id="contador">10</span> segundos...</p>
            </div>
            <div id="player"></div>
        </div>
    </main>

    <script>
        // --- LÓGICA DO PLAYER ---
        let canaisRaw = [];
        let aguardandoFHD = false;

        // Simulando carregamento do JSON (Substitua pela url do seu arquivo)
        async function carregarCanais() {
            // Para testar, estou usando um exemplo. Mude para '45s84e1sfer.json'
            canaisRaw = [
                {"canal": "GLOOBINHO", "logo": "https://redecanaistv.plus/player3/ch.php?canal=gloobinho", "qualidade": "fhd"}
            ];
            renderList();
        }

        function renderList() {
            const l = document.getElementById('contentList');
            canaisRaw.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'item';
                if (item.qualidade === "fhd") div.classList.add('canal-fhd');
                div.innerHTML = `<span>${item.canal}</span>`;
                div.onclick = () => playCanal(item, div);
                l.appendChild(div);
            });
        }

        function playCanal(c, el) {
            if (aguardandoFHD) return;
            if (c.qualidade === "fhd") {
                aguardandoFHD = true;
                exibirAvisoFHD();
                setTimeout(() => {
                    injetarPlayer(c);
                    aguardandoFHD = false;
                }, 10000);
            } else {
                injetarPlayer(c);
            }
        }

        function exibirAvisoFHD() {
            const avisoDiv = document.getElementById('iframe-overlay-aviso');
            const contadorSpan = document.getElementById('contador');
            let segundos = 10;
            avisoDiv.style.display = 'flex';
            contadorSpan.innerText = segundos;
            const intervalo = setInterval(() => {
                segundos--;
                contadorSpan.innerText = segundos;
                if (segundos <= 0) {
                    clearInterval(intervalo);
                    avisoDiv.style.display = 'none';
                }
            }, 1000);
        }

        function injetarPlayer(c) {
            document.getElementById("player").innerHTML = `<iframe src="${c.logo}" allowfullscreen allow="autoplay; fullscreen" style="width:100%;height:100%;border:none;"></iframe>`;
        }

        window.onload = carregarCanais;
    </script>
</body>
</html>
