<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sinal Perdido - 404</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* O efeito de chiado (TV estática) */
        .noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;charset=utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.15;
            z-index: 1;
        }

        .container { z-index: 2; text-align: center; color: #fff; text-shadow: 0 0 10px #000; }
        h1 { font-size: 80px; margin: 0; font-family: sans-serif; }
        p { font-size: 20px; font-family: monospace; }
        
        /* Scanlines */
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px; z-index: 3; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="scanlines"></div>
    
    <div class="container">
        <h1 id="error-code">404</h1>
        <p>SINAL PERDIDO NO ESPAÇO</p>
        <button onclick="window.location.href='index.html'" style="background:none; border:1px solid #fff; color:#fff; padding:10px 20px; cursor:pointer; margin-top:20px;">VOLTAR PARA A TV</button>
    </div>

    <script>
        // Efeito de pulso de luz aleatório
        setInterval(() => {
            const body = document.querySelector('body');
            body.style.filter = `brightness(${0.8 + Math.random() * 0.4})`;
        }, 100);
    </script>
</body>
</html>
