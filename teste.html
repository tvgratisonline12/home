<!DOCTYPE html>
<html>
<head>
    <title>Meu Site de Canais</title>
    <!-- Player Clappr (robusto) -->
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
</head>
<body>

    <!-- Onde o vídeo vai tocar -->
    <div id="player"></div>

    <script>
        // A URL do seu Worker
        const workerUrl = "https://placar-sofascore.dircianoafonso.workers.dev/?url=";

        // O link completo da Pluto TV que você extraiu
        const linkPluto = "https://stitcher-ipv4.pluto.tv/v2/stitch/embed/hls/channel/5f357e91b18f0b00073583d2/master.m3u8?deviceType=samsung-tvplus&authToken=SUA_TOKEN_AQUI...";

        // Monta a URL final
        const urlFinal = workerUrl + encodeURIComponent(linkPluto);

        // Inicializa o player apontando para o seu Worker
        var player = new Clappr.Player({
            source: urlFinal,
            parentId: "#player",
            width: '100%',
            height: '500px',
            autoPlay: true
        });
    </script>
</body>
</html>
