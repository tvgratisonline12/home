<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Player Dinâmico via Proxy</title>
    
    <!-- CSS do Video.js -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <style>
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .video-container { width: 90%; max-width: 800px; }
        .video-js { width: 100%; height: auto; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="meu-player" class="video-js vjs-default-skin" controls preload="auto">
        </video>
    </div>

    <!-- Scripts -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        // 1. URL do seu Worker
        const workerUrl = 'https://placar-sofascore.dircianoafonso.workers.dev/';
        
        // 2. O link do stream original que você deseja assistir
        const targetLink = 'https://jmp2.uk/plu-656e2a81954b020008ed17a4.m3u8';
        
        // 3. Monta a URL final (Worker + Parâmetro)
        const videoSrc = workerUrl + '?url=' + encodeURIComponent(targetLink);
        
        const videoElement = document.getElementById('meu-player');

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(videoElement);
            
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                videoElement.play().catch(err => console.log("Erro ao iniciar:", err));
            });
            
            hls.on(Hls.Events.ERROR, function (event, data) {
                console.error("Erro no HLS:", data);
            });
        }
    </script>
</body>
</html>
