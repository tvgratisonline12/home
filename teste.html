<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player de Streaming</title>
    
    <!-- CSS do Video.js -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <style>
        body { 
            background-color: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .video-container { 
            width: 100%; 
            max-width: 900px; 
        }
        .video-js { width: 100%; height: auto; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="meu-player" class="video-js vjs-default-skin" controls preload="auto">
            <p class="vjs-no-js">
                Para ver este vídeo, por favor, ative o JavaScript.
            </p>
        </video>
    </div>

    <!-- Scripts -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        // URL do seu Worker
        const videoSrc = 'https://placar-sofascore.dircianoafonso.workers.dev/';
        const videoElement = document.getElementById('meu-player');

        if (Hls.isSupported()) {
            const hls = new Hls();
            
            // Carrega a fonte através do seu worker
            hls.loadSource(videoSrc);
            hls.attachMedia(videoElement);
            
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                videoElement.play().catch(e => console.log("Auto-play bloqueado pelo navegador: ", e));
            });
            
            hls.on(Hls.Events.ERROR, function (event, data) {
                console.error("Erro no HLS: ", data);
            });
        } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
            // Suporte nativo (iOS/Safari)
            videoElement.src = videoSrc;
            videoElement.addEventListener('loadedmetadata', function() {
                videoElement.play();
            });
        }
    </script>
</body>
</html>
