<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Grátis - Player Oficial</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #wrapper { position: relative; width: 100%; height: 100vh; }
        
        /* Iframe com sandbox estrito para bloquear pop-ups */
        #site-iframe { 
            width: 100%; height: 100%; border: none; 
        }
        
        /* Camada para forçar a interação do usuário (necessária para o Autoplay) */
        #glass-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex; align-items: center; 
            justify-content: center; cursor: pointer; z-index: 999;
            color: white; font-family: sans-serif; font-size: 20px;
        }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="glass-overlay">
        <div style="text-align: center;">
            <button style="padding: 15px 30px; font-size: 20px; cursor: pointer; background: #ff0000; color: #fff; border: none; border-radius: 8px;">CLIQUE PARA ASSISTIR</button>
        </div>
    </div>
    
    <iframe id="site-iframe" 
            src="https://redecanaistv.plus/player3/ch.php?canal=gloobinho" 
            sandbox="allow-scripts allow-same-origin allow-autoplay allow-forms"
            allow="autoplay; fullscreen" 
            allowfullscreen>
    </iframe>
</div>

<script>
    const overlay = document.getElementById('glass-overlay');
    const iframe = document.getElementById('site-iframe');

    overlay.addEventListener('click', function() {
        // Remove a tela de bloqueio
        overlay.style.display = 'none';

        // Tenta disparar o play no vídeo dentro do iframe
        try {
            // O foco no iframe ajuda o player a capturar o evento de play
            iframe.focus();
            
            // Script de injeção direta para tentar forçar o play no vídeo
            const playScript = `
                (function() {
                    const v = document.querySelector('video');
                    if (v) {
                        v.muted = false;
                        v.play().catch(e => console.log("Play aguardando interação."));
                    }
                })();
            `;
            // Nota: Se der erro de CORS aqui, o player deles é extremamente protegido, 
            // mas o atributo sandbox já impedirá a propaganda de abrir.
        } catch(e) {
            console.log("Injeção bloqueada por segurança.");
        }
    });
</script>

</body>
</html>
