<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Grátis</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos essenciais para o Foco (Android TV) */
        .focus {
            outline: 3px solid #ff9900 !important;
            transform: scale(1.05);
            background-color: #333 !important;
            z-index: 10;
        }
        .categoria-btn, .tituloCategoria { transition: 0.2s; }
        .item { padding: 15px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <aside>
        <div class="brand-container">
            <div class="categoria-header">
                <button class="cat-btn" onclick="categoriaAnterior()">❮</button>
                <div id="categoriaAtual" class="tituloCategoria" tabindex="0">Todos</div>
                <button class="cat-btn" onclick="proximaCategoria()">❯</button>
            </div>
        </div>
        
        <div class="channel-list" id="contentList">
            </div>
    </aside>
    
    <main>
        <div id="player-container">
            <div id="player"></div>
            <div id="iframe-overlay"></div>
        </div>
    </main>

    <script src="tv.js"></script>
    <script>
        // Função de Fullscreen adaptada para o D-PAD Enter
        function toggleFullScreen() {
            const container = document.getElementById('player-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
